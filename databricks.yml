# Declarative bundle for Databricks Apps (deploy with: databricks apps deploy)
# Uses the default CLI profile when you omit --profile (see ~/.databrickscfg [DEFAULT]).
bundle:
  name: rail_saathi_chat

resources:
  apps:
    rail_saathi_chat:
      name: rail-saathi-chat
      description: Rail Saathi chat - FastAPI backend serving the built frontend
      source_code_path: .
      config:
        command:
          - npm
          - run
          - databricks:start
        # uv starts FastAPI after building the frontend, and FastAPI serves both UI and API.

targets:
  dev:
    default: true
